name: dependency-review

on:
  pull_request:
    branches: ['main']

permissions:
  contents: read

jobs:
  dependency-review:
    name: dependency-review
    # Public repositories support dependency review by default.
    # Private repositories need GitHub Code Security / GHAS, so keep them opt-in.
    if: ${{ github.event.repository.private == false || vars.ENABLE_DEPENDENCY_REVIEW == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Dependency review
        # pinned from v4
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48
        with:
          fail-on-severity: high
