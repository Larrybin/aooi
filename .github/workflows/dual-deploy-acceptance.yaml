name: Single Origin Deploy Acceptance

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
  workflow_dispatch:

jobs:
  acceptance:
    name: ${{ matrix.deploy_target }} acceptance
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        deploy_target: [vercel, cloudflare]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aooi
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d aooi"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DEPLOY_TARGET: ${{ matrix.deploy_target }}
      DATABASE_PROVIDER: postgresql
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/aooi
      BETTER_AUTH_SECRET: ci-auth-secret-not-for-production
      AUTH_SECRET: ci-auth-secret-not-for-production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run database migrations
        run: pnpm db:migrate

      - name: Run unit and contract tests
        run: pnpm test

      - name: Run Cloudflare config gate
        if: matrix.deploy_target == 'cloudflare'
        run: pnpm cf:check

      - name: Run Cloudflare build gate
        if: matrix.deploy_target == 'cloudflare'
        run: pnpm cf:build

      - name: Run Cloudflare local runtime smoke
        if: matrix.deploy_target == 'cloudflare'
        run: pnpm test:cf-local-smoke
