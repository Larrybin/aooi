name: Cloudflare Deploy Acceptance

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
  workflow_dispatch:

jobs:
  acceptance:
    name: cloudflare acceptance
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aooi
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d aooi"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      SITE: mamamiya
      DEPLOY_TARGET: cloudflare
      DATABASE_PROVIDER: postgresql
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/aooi
      BETTER_AUTH_SECRET: ci-auth-secret-not-for-production
      AUTH_SECRET: ci-auth-secret-not-for-production
      RESEND_API_KEY: ci-resend-api-key-not-for-production
      STORAGE_PUBLIC_BASE_URL: http://127.0.0.1:8787/assets/

    steps:
      - name: Checkout repository
        # pinned from v6
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Setup pnpm
        # pinned from v5
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e
        with:
          version: 10

      - name: Setup Node.js
        # pinned from v6
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run database migrations
        run: pnpm db:migrate

      - name: Run release input guard
        run: >
          node scripts/check-release-inputs.mjs
          --base-sha="${{ github.event.before }}"
          --head-sha="${{ github.sha }}"

      - name: Run lint
        run: pnpm lint

      - name: Run architecture gate
        run: pnpm arch:check

      - name: Run unit and contract tests
        run: pnpm test

      - name: Run Cloudflare config gate
        run: pnpm cf:check

      - name: Run Cloudflare build gate
        run: pnpm cf:build
