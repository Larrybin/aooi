name: Cloudflare Production Deploy

on:
  workflow_run:
    workflows: ['Cloudflare Deploy Acceptance']
    types: [completed]

concurrency:
  group: cloudflare-production-deploy
  cancel-in-progress: false

jobs:
  prepare-release:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    permissions:
      actions: read
      contents: read
    outputs:
      head_sha: ${{ steps.release.outputs.head_sha }}
      base_sha: ${{ steps.release.outputs.base_sha }}
      db_schema_changed: ${{ steps.release.outputs.db_schema_changed }}
      do_migration_changed: ${{ steps.release.outputs.do_migration_changed }}
      release_kind: ${{ steps.release.outputs.release_kind }}

    steps:
      - name: Resolve release artifact metadata
        id: artifact
        # pinned from v9
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const runId = context.payload.workflow_run.id;
            const { data } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId,
            });

            const artifact = data.artifacts.find(
              (entry) => entry.name === 'release-metadata'
            );

            if (!artifact) {
              core.setFailed(`Missing release-metadata artifact for workflow run ${runId}`);
              return;
            }

            core.setOutput('artifact_id', String(artifact.id));

      - name: Download release metadata artifact
        env:
          ARTIFACT_ID: ${{ steps.artifact.outputs.artifact_id }}
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p ".tmp/release-metadata"
          curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${ARTIFACT_ID}/zip" \
            -o ".tmp/release-metadata/release-metadata.zip"
          unzip -p ".tmp/release-metadata/release-metadata.zip" "release-metadata.json" > ".tmp/release-metadata/release-metadata.json"

      - name: Reject historical acceptance reruns
        id: main-head
        # pinned from v9
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const currentMainRef = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'heads/main',
            });

            const currentMainSha = currentMainRef.data.object.sha;
            const acceptedHeadSha = context.payload.workflow_run.head_sha;

            core.setOutput('current_main_sha', currentMainSha);

            if (acceptedHeadSha !== currentMainSha) {
              core.setFailed(
                `Refusing auto-deploy for historical acceptance run ${context.payload.workflow_run.id}: accepted head ${acceptedHeadSha} is not the current main head ${currentMainSha}. Historical reruns must not publish to production.`
              );
            }

      - name: Export release metadata
        id: release
        env:
          ACCEPTED_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          CURRENT_MAIN_SHA: ${{ steps.main-head.outputs.current_main_sha }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const metadataPath = '.tmp/release-metadata/release-metadata.json';
          const metadata = JSON.parse(fs.readFileSync(metadataPath, 'utf8'));
          if (metadata.head_sha !== process.env.ACCEPTED_HEAD_SHA) {
            throw new Error(
              `release-metadata head_sha ${metadata.head_sha} does not match workflow_run.head_sha ${process.env.ACCEPTED_HEAD_SHA}`
            );
          }

          if (process.env.ACCEPTED_HEAD_SHA !== process.env.CURRENT_MAIN_SHA) {
            throw new Error(
              `accepted head ${process.env.ACCEPTED_HEAD_SHA} is not the current main head ${process.env.CURRENT_MAIN_SHA}; automatic deploy was rejected`
            );
          }

          const lines = [
            `head_sha=${metadata.head_sha}`,
            `base_sha=${metadata.base_sha}`,
            `db_schema_changed=${metadata.db_schema_changed ? 'true' : 'false'}`,
            `do_migration_changed=${metadata.do_migration_changed ? 'true' : 'false'}`,
            `release_kind=${metadata.release_kind}`,
          ];
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `${lines.join('\n')}\n`);
          console.log('[cloudflare-release] metadata', metadata);
          NODE

  migrate-db:
    name: Run production migrations
    needs: prepare-release
    if: needs.prepare-release.outputs.db_schema_changed == 'true'
    uses: ./.github/workflows/cloudflare-production-migrate.yaml
    with:
      target_sha: ${{ needs.prepare-release.outputs.head_sha }}

  deploy-do-migration:
    name: Deploy Cloudflare Durable Object migration
    runs-on: ubuntu-latest
    needs: [prepare-release, migrate-db]
    if: >-
      needs.prepare-release.result == 'success' &&
      needs.prepare-release.outputs.release_kind == 'migration' &&
      (
        needs.migrate-db.result == 'success' ||
        needs.migrate-db.result == 'skipped'
      )
    environment: cloudflare-production
    permissions:
      contents: read
    env:
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Checkout target commit
        # pinned from v6
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ needs.prepare-release.outputs.head_sha }}

      - name: Setup pnpm
        # pinned from v5
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: 10

      - name: Setup Node.js
        # pinned from v6
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy Cloudflare Durable Object migration
        run: pnpm cf:deploy:migration

  deploy-normal-rollout:
    name: Deploy Cloudflare production
    runs-on: ubuntu-latest
    needs: [prepare-release, migrate-db]
    if: >-
      needs.prepare-release.result == 'success' &&
      needs.prepare-release.outputs.release_kind == 'normal' &&
      (
        needs.migrate-db.result == 'success' ||
        needs.migrate-db.result == 'skipped'
      )
    environment: cloudflare-production
    permissions:
      contents: read
    env:
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Checkout target commit
        # pinned from v6
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ needs.prepare-release.outputs.head_sha }}

      - name: Setup pnpm
        # pinned from v5
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: 10

      - name: Setup Node.js
        # pinned from v6
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy Cloudflare production rollout
        run: pnpm cf:deploy:rollout
